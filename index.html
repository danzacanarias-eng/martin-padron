<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martín Padrón</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100%;
    background: #2a2a2a;
    font-family: 'Georgia', serif;
    color: #ccc;
  }

  /* ── GALERÍA ── */
  #galeria {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  .titulo {
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 48px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 6px;
  }

  .thumb {
    aspect-ratio: 3/2;
    overflow: hidden;
    cursor: pointer;
    background: #1a1a1a;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.85;
    transition: opacity 0.3s ease, transform 0.4s ease;
  }

  .thumb:hover img {
    opacity: 1;
    transform: scale(1.03);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #2a2a2a;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #lightbox.activo { display: flex; }

  #lb-foto {
    max-width: calc(100vw - 120px);
    max-height: calc(100vh - 80px);
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
    display: block;
  }

  #lb-foto.visible { opacity: 1; }

  .lb-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 110;
  }

  #lightbox.activo:hover .lb-arrow { opacity: 1; }

  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }

  .lb-arrow svg {
    width: 28px; height: 28px;
    stroke: rgba(255,255,255,0.6);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }

  .lb-arrow:hover svg { stroke: #fff; }

  #lb-cerrar {
    position: fixed;
    top: 20px; right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 28px;
    line-height: 1;
    z-index: 110;
    transition: color 0.2s;
    padding: 8px;
  }

  #lb-cerrar:hover { color: #fff; }

  #lb-contador {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    z-index: 110;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #lightbox.activo:hover #lb-contador { opacity: 1; }

  @media (max-width: 600px) {
    #galeria { padding: 40px 16px 60px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    #lb-foto { max-width: calc(100vw - 40px); max-height: calc(100vh - 60px); }
  }
</style>
</head>
<body>

<!-- GALERÍA -->
<div id="galeria">
  <p class="titulo">Martín Padrón</p>
  <div class="grid" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-cerrar" onclick="cerrar()">&#xd7;</button>
  <img id="lb-foto" src="" alt="">
  <button class="lb-arrow" id="lb-prev" onclick="mover(-1)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="lb-arrow" id="lb-next" onclick="mover(1)">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </button>
  <div id="lb-contador"></div>
</div>

<script>
  const fotos = [
    "images/_ER67311-Editar.jpg",
    "images/_ER67322-Editar-2.jpg",
    "images/_ER67426.jpg",
    "images/_ER67440.jpg",
    "images/_ER67441.jpg",
    "images/_ER67446.jpg",
    "images/_ER67447.jpg",
    "images/_ER67448.jpg",
    "images/_ER67453-Editar.jpg",
    "images/_ER67458-Editar.jpg",
    "images/_ER67462.jpg",
    "images/_ER67464.jpg",
    "images/_ER67465-Editar.jpg"
  ];

  let actual = 0;
  const lb = document.getElementById("lightbox");
  const lbFoto = document.getElementById("lb-foto");
  const lbContador = document.getElementById("lb-contador");

  // Construir grid
  const grid = document.getElementById("grid");
  fotos.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "thumb";
    div.onclick = () => abrir(i);
    const img = document.createElement("img");
    img.src = f;
    img.alt = "";
    img.loading = "lazy";
    div.appendChild(img);
    grid.appendChild(div);
  });

  function abrir(i) {
    actual = i;
    lb.classList.add("activo");
    document.body.style.overflow = "hidden";
    mostrar();
  }

  function cerrar() {
    lb.classList.remove("activo");
    document.body.style.overflow = "";
    lbFoto.classList.remove("visible");
  }

  function mostrar() {
    lbFoto.classList.remove("visible");
    setTimeout(() => {
      lbFoto.src = fotos[actual];
      lbFoto.onload = () => lbFoto.classList.add("visible");
    }, 250);
    lbContador.textContent = (actual + 1) + " / " + fotos.length;
  }

  function mover(dir) {
    actual = (actual + dir + fotos.length) % fotos.length;
    mostrar();
  }

  // Teclado
  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("activo")) return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") mover(1);
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   mover(-1);
    if (e.key === "Escape") cerrar();
  });

  // Swipe
  let startX = 0;
  lb.addEventListener("touchstart", e => startX = e.touches[0].clientX);
  lb.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) mover(diff > 0 ? 1 : -1);
  });

  // Clic en zona neutra cierra
  lb.addEventListener("click", e => {
    if (e.target === lb) cerrar();
  });
</script>
</body>
</html>
