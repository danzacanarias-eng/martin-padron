<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martín Padrón</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100%;
    background: #2a2a2a;
    font-family: 'Georgia', serif;
    color: #ccc;
  }

  /* ── CABECERA ── */
  header {
    text-align: center;
    padding: 52px 20px 0;
  }

  header h1 {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ddd;
  }

  header p {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #666;
    margin-top: 8px;
  }

  /* ── MENÚ ── */
  nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 36px 20px 40px;
  }

  nav button {
    background: none;
    border: 1px solid #444;
    color: #888;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  nav button:hover {
    border-color: #888;
    color: #ccc;
  }

  nav button.activo {
    border-color: #aaa;
    color: #ddd;
  }

  /* ── GRID ── */
  #galeria {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 30px 80px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 6px;
  }

  .thumb {
    aspect-ratio: 3/2;
    overflow: hidden;
    cursor: pointer;
    background: #1a1a1a;
  }

  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.82;
    transition: opacity 0.3s ease, transform 0.4s ease;
  }

  .thumb:hover img {
    opacity: 1;
    transform: scale(1.03);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #2a2a2a;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #lightbox.activo { display: flex; }

  #lb-foto {
    max-width: calc(100vw - 120px);
    max-height: calc(100vh - 80px);
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.5s ease;
    display: block;
  }

  #lb-foto.visible { opacity: 1; }

  .lb-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 110;
  }

  #lightbox.activo:hover .lb-arrow { opacity: 1; }

  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }

  .lb-arrow svg {
    width: 28px; height: 28px;
    stroke: rgba(255,255,255,0.6);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }

  .lb-arrow:hover svg { stroke: #fff; }

  #lb-cerrar {
    position: fixed;
    top: 20px; right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.35);
    font-size: 28px;
    line-height: 1;
    z-index: 110;
    transition: color 0.2s;
    padding: 8px;
  }

  #lb-cerrar:hover { color: #fff; }

  #lb-contador {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    z-index: 110;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #lightbox.activo:hover #lb-contador { opacity: 1; }

  @media (max-width: 600px) {
    #galeria { padding: 0 12px 60px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    #lb-foto { max-width: calc(100vw - 40px); max-height: calc(100vh - 60px); }
    nav { gap: 4px; padding: 28px 12px 32px; }
    nav button { font-size: 10px; padding: 7px 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>Martín Padrón</h1>
  <p>unidad dād · La Gomera</p>
</header>

<nav id="menu"></nav>

<div id="galeria">
  <div class="grid" id="grid"></div>
</div>

<div id="lightbox">
  <button id="lb-cerrar" onclick="cerrar()">&#xd7;</button>
  <img id="lb-foto" src="" alt="">
  <button class="lb-arrow" id="lb-prev" onclick="mover(-1)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="lb-arrow" id="lb-next" onclick="mover(1)">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </button>
  <div id="lb-contador"></div>
</div>

<script>
  const categorias = [
    {
      nombre: "Contracción",
      fotos: [
        "MP_contrac_00001.jpg",
        "images/MP_contrac_00002.jpg",
        "images/MP_contrac_00003.jpg",
        "images/MP_contrac_00004.jpg",
        "images/MP_contrac_00005.jpg",
        "images/MP_contrac_00006.jpg",
        "images/MP_contrac_00007.jpg"
      ]
    },
    {
      nombre: "Equilibrio",
      fotos: [
        "images/MP_equilibrio_00001.jpg",
        "images/MP_equilibrio_00002.jpg",
        "images/MP_equilibrio_00003.jpg",
        "images/MP_equilibrio_00004.jpg"
      ]
    },
    {
      nombre: "Jump",
      fotos: [
        "images/MP_jump_00001.jpg"
      ]
    },
    {
      nombre: "Pose",
      fotos: [
        "images/MP_pose_00001.jpg"
      ]
    },
    {
      nombre: "Suelo",
      fotos: [
        "images/MP_suelo_00001.jpg",
        "images/MP_suelo_00002.jpg",
        "images/MP_suelo_00003.jpg"
      ]
    }
  ];

  let categoriaActual = 0;
  let fotosActuales = [];
  let actual = 0;

  const lb = document.getElementById("lightbox");
  const lbFoto = document.getElementById("lb-foto");
  const lbContador = document.getElementById("lb-contador");
  const grid = document.getElementById("grid");
  const menu = document.getElementById("menu");

  // Construir menú
  categorias.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.textContent = cat.nombre;
    btn.onclick = () => seleccionarCategoria(i);
    btn.id = "btn-" + i;
    menu.appendChild(btn);
  });

  function seleccionarCategoria(i) {
    categoriaActual = i;
    fotosActuales = categorias[i].fotos;

    // Actualizar botones
    document.querySelectorAll("nav button").forEach((b, j) => {
      b.classList.toggle("activo", j === i);
    });

    // Reconstruir grid
    grid.innerHTML = "";
    fotosActuales.forEach((f, idx) => {
      const div = document.createElement("div");
      div.className = "thumb";
      div.onclick = () => abrir(idx);
      const img = document.createElement("img");
      img.src = f;
      img.alt = "";
      img.loading = "lazy";
      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function abrir(i) {
    actual = i;
    lb.classList.add("activo");
    document.body.style.overflow = "hidden";
    mostrar();
  }

  function cerrar() {
    lb.classList.remove("activo");
    document.body.style.overflow = "";
    lbFoto.classList.remove("visible");
  }

  function mostrar() {
    lbFoto.classList.remove("visible");
    setTimeout(() => {
      lbFoto.src = fotosActuales[actual];
      lbFoto.onload = () => lbFoto.classList.add("visible");
    }, 250);
    lbContador.textContent = (actual + 1) + " / " + fotosActuales.length;
  }

  function mover(dir) {
    actual = (actual + dir + fotosActuales.length) % fotosActuales.length;
    mostrar();
  }

  // Teclado
  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("activo")) return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") mover(1);
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   mover(-1);
    if (e.key === "Escape") cerrar();
  });

  // Swipe
  let startX = 0;
  lb.addEventListener("touchstart", e => startX = e.touches[0].clientX);
  lb.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) mover(diff > 0 ? 1 : -1);
  });

  // Clic en zona neutra cierra
  lb.addEventListener("click", e => {
    if (e.target === lb) cerrar();
  });

  // Cargar primera categoría
  seleccionarCategoria(0);
</script>
</body>
</html>
